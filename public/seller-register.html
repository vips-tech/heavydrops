<body style="background: var(--color-noir); color: var(--color-ivory);">

    <div class="container" style="max-width: 600px; padding: 100px 0;">
        <h1 class="editorial-title" style="color: var(--color-gold); font-size: 2.5rem; margin-bottom: 20px;">Partner
            Application</h1>
        <p style="opacity: 0.7; margin-bottom: 40px; line-height: 1.8;">
            Heavy Drops is a curated discovery network. We only partner with jewellers who maintain the highest
            standards of craft and transparency. Apply to list your collection.
        </p>

        <form id="sellerRegisterForm"
            style="background: var(--color-gray-dark); padding: 40px; border-radius: var(--radius-sm);">
            <div style="margin-bottom: 25px;">
                <label
                    style="display: block; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 10px; opacity: 0.6;">Business
                    Name</label>
                <input type="text" id="businessName" placeholder="e.g., Royal Artisans" required
                    style="width: 100%; background: transparent; border: 1px solid rgba(255,255,255,0.1); color: white; padding: 15px; border-radius: 4px;">
            </div>
            <div style="margin-bottom: 25px;">
                <label
                    style="display: block; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 10px; opacity: 0.6;">Corporate
                    Email</label>
                <input type="email" id="email" placeholder="contact@business.com" required
                    style="width: 100%; background: transparent; border: 1px solid rgba(255,255,255,0.1); color: white; padding: 15px; border-radius: 4px;">
            </div>
            <div style="margin-bottom: 25px;">
                <label
                    style="display: block; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 10px; opacity: 0.6;">Service
                    City</label>
                <input type="text" id="city" placeholder="e.g., Chennai" required
                    style="width: 100%; background: transparent; border: 1px solid rgba(255,255,255,0.1); color: white; padding: 15px; border-radius: 4px;">
            </div>
            <div style="margin-bottom: 35px;">
                <label
                    style="display: block; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 10px; opacity: 0.6;">Brand
                    Story (Curation Summary)</label>
                <textarea id="brandStory" placeholder="Describe your heritage and quality standards..."
                    style="width: 100%; background: transparent; border: 1px solid rgba(255,255,255,0.1); color: white; padding: 15px; border-radius: 4px; height: 100px; font-family: inherit;"></textarea>
            </div>

            <button type="submit" class="btn-primary"
                style="width: 100%; background: var(--color-gold); color: var(--color-noir);">Submit for Audit</button>
        </form>
    </div>

    
        
        <script>
            let systemConfig = {};
            let userLikes = new Set();

            // Mobile Navigation Toggle
            function toggleMobileMenu() {
                const navCenter = document.getElementById('navCenter');
                const isActive = navCenter.classList.contains('active');
                
                if (isActive) {
                    navCenter.classList.remove('active');
                    document.body.style.overflow = '';
                } else {
                    navCenter.classList.add('active');
                    document.body.style.overflow = 'hidden';
                }
            }

            // Initialize Application
            async function init() {
                try {
                    // Fetch system configuration
                    const configResp = await fetch('/api/health/config');
                    systemConfig = await configResp.json();

                    if (systemConfig.pilot_mode) {
                        const pilotElement = document.getElementById('pilotCity');
                        if (pilotElement) {
                            pilotElement.innerText = systemConfig.constraints.RESTRICTED_CITY;
                        }
                    }
                } catch (e) { 
                    console.error('Config fetch failed:', e); 
                }

                // Load user likes if authenticated
                await loadUserLikes();
                
                // Fetch and display designs if on collection page
                if (typeof fetchDesigns === 'function') {
                    await fetchDesigns();
                }
            }

            // Load User Likes
            async function loadUserLikes() {
                if (typeof Session === 'undefined' || !Session.isAuthenticated()) return;

                try {
                    const response = await fetch('/api/likes/me', {
                        headers: { 'Authorization': `Bearer ${Session.getToken()}` }
                    });
                    if (response.ok) {
                        const likes = await response.json();
                        userLikes = new Set(likes.map(l => l.design_id));
                    }
                } catch (e) {
                    console.error('Failed to load likes:', e);
                }
            }

            // Enhanced Like Toggle with Animation
            async function toggleLike(event, design_id, btn) {
                event.stopPropagation();
                
                if (!Session.isAuthenticated()) {
                    window.location.href = '/login.html';
                    return;
                }

                try {
                    const res = await fetch('/api/likes/toggle', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${Session.getToken()}`
                        },
                        body: JSON.stringify({ design_id })
                    });
                    
                    const data = await res.json();
                    
                    if (res.ok) {
                        // Update local state
                        if (data.liked) {
                            userLikes.add(design_id);
                        } else {
                            userLikes.delete(design_id);
                        }
                        
                        // Animate the like button
                        if (window.heavyDropsEnhanced) {
                            window.heavyDropsEnhanced.animateLike(btn, data.liked);
                        } else {
                            btn.classList.toggle('active', data.liked);
                        }
                    }
                } catch (e) {
                    console.error('Like toggle failed:', e);
                }
            }

            // Initialize when DOM is ready
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        </script>
        
        
</body>

</html>
