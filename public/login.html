<style>
    .login-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 140px 2rem 4rem;
        background: linear-gradient(135deg, #f9f9f9 0%, #f5f5f5 100%);
    }
    
    .login-card {
        background: white;
        padding: 3rem;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        max-width: 500px;
        width: 100%;
        animation: fadeInUp 0.6s ease-out;
    }
    
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .login-card h2 {
        font-family: var(--font-heading);
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        color: var(--color-noir);
        text-align: center;
    }
    
    .subtitle {
        text-align: center;
        color: var(--color-gray-dark);
        font-size: 1rem;
        margin-bottom: 2rem;
        line-height: 1.6;
    }
    
    .role-selector {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.5rem;
        margin-bottom: 2rem;
        background: #f5f5f5;
        padding: 0.5rem;
        border-radius: 12px;
    }
    
    .role-selector button {
        padding: 0.875rem 1rem;
        border: none;
        background: transparent;
        color: var(--color-gray-dark);
        font-weight: 600;
        font-size: 0.9rem;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }
    
    .role-selector button.active {
        background: var(--color-gold);
        color: white;
        box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
    }
    
    .role-selector button:hover:not(.active) {
        background: rgba(212, 175, 55, 0.1);
        color: var(--color-gold);
    }
    
    .form-group {
        margin-bottom: 1.5rem;
    }
    
    .form-group label {
        display: block;
        font-weight: 600;
        font-size: 0.9rem;
        color: var(--color-noir);
        margin-bottom: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }
    
    .form-group input {
        width: 100%;
        padding: 1rem 1.25rem;
        border: 2px solid #e8e8e8;
        border-radius: 12px;
        font-size: 1rem;
        font-family: var(--font-body);
        transition: all 0.3s ease;
        background: white;
    }
    
    .form-group input:focus {
        outline: none;
        border-color: var(--color-gold);
        box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1);
    }
    
    .form-group input::placeholder {
        color: #999;
    }
    
    .btn-primary {
        width: 100%;
        padding: 1.125rem 2rem;
        background: linear-gradient(135deg, var(--color-gold), var(--color-gold-light));
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        margin-top: 1rem;
    }
    
    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
    }
    
    .btn-primary:active {
        transform: translateY(0);
    }
    
    .footer-note {
        text-align: center;
        font-size: 0.85rem;
        color: var(--color-gray-medium);
        margin-top: 2rem;
        padding-top: 2rem;
        border-top: 1px solid #f0f0f0;
    }
    
    .success-message {
        background: #10B981;
        color: white;
        padding: 1rem;
        border-radius: 8px;
        margin-bottom: 1rem;
        text-align: center;
        font-weight: 600;
    }
    
    .error-message {
        background: #EF4444;
        color: white;
        padding: 1rem;
        border-radius: 8px;
        margin-bottom: 1rem;
        text-align: center;
        font-weight: 600;
    }
    
    @media (max-width: 768px) {
        .login-container {
            padding: 120px 1rem 2rem;
        }
        
        .login-card {
            padding: 2rem 1.5rem;
        }
        
        .login-card h2 {
            font-size: 1.5rem;
        }
        
        .role-selector {
            grid-template-columns: 1fr;
        }
    }
</style>

<div class="login-container">
    <div class="login-card">
        <h2>Welcome to Heavy Drops</h2>
        <p class="subtitle">
            Access your account with OTP verification
        </p>

        <div class="role-selector">
            <button type="button" id="btnBuyer" class="active" onclick="setRole('buyer')">Buyer</button>
            <button type="button" id="btnSeller" onclick="setRole('seller')">Seller</button>
            <button type="button" id="btnAdmin" onclick="setRole('admin')">Admin</button>
        </div>

        <div id="messageContainer"></div>

        <!-- OTP Form for Buyer/Seller -->
        <form id="otpForm" style="display: block;">
            <div id="phoneSection">
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="+91 00000 00000" required>
                </div>
                <button type="button" class="btn-primary" onclick="requestOTP()">Request OTP</button>
            </div>

            <div id="verifySection" style="display: none;">
                <div class="form-group">
                    <label>Enter OTP</label>
                    <input type="text" id="otp" placeholder="123456" maxlength="6" required>
                </div>
                <button type="button" class="btn-primary" onclick="verifyOTP()">Verify & Login</button>
                <p style="margin-top: 1rem; font-size: 0.9rem; color: var(--color-gray-dark); text-align: center;">
                    OTP sent to your mobile number<br>
                    <small style="color: var(--color-gold);">Use OTP: 123456 for testing</small>
                </p>
            </div>
        </form>

        <!-- Admin Credential Form -->
        <form id="adminForm" style="display: none;">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="adminUsername" placeholder="admin" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="adminPassword" placeholder="admin" required>
            </div>
            <button type="button" class="btn-primary" onclick="adminLogin()">Admin Login</button>
            <p style="margin-top: 1rem; font-size: 0.9rem; color: var(--color-gray-dark); text-align: center;">
                <small style="color: var(--color-gold);">Default: admin / admin</small>
            </p>
        </form>

        <p class="footer-note">
            Secure access for verified partners
        </p>
    </div>
</div>

<script>
    let currentRole = 'buyer';
    let currentPhone = '';

    function setRole(role) {
        currentRole = role;
        
        // Update button states
        document.getElementById('btnBuyer').classList.toggle('active', role === 'buyer');
        document.getElementById('btnSeller').classList.toggle('active', role === 'seller');
        document.getElementById('btnAdmin').classList.toggle('active', role === 'admin');
        
        // Show/hide forms
        if (role === 'admin') {
            document.getElementById('otpForm').style.display = 'none';
            document.getElementById('adminForm').style.display = 'block';
        } else {
            document.getElementById('otpForm').style.display = 'block';
            document.getElementById('adminForm').style.display = 'none';
            document.getElementById('phoneSection').style.display = 'block';
            document.getElementById('verifySection').style.display = 'none';
        }
        
        clearMessages();
    }

    function showMessage(message, type = 'success') {
        const container = document.getElementById('messageContainer');
        container.innerHTML = `<div class="${type}-message">${message}</div>`;
        
        setTimeout(() => {
            container.innerHTML = '';
        }, 5000);
    }

    function clearMessages() {
        document.getElementById('messageContainer').innerHTML = '';
    }

    async function requestOTP() {
        const phone = document.getElementById('phone').value.trim();
        
        if (!phone) {
            showMessage('Please enter your phone number', 'error');
            return;
        }
        
        currentPhone = phone;
        
        try {
            const response = await fetch('/api/auth/request-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    phone: phone,
                    role: currentRole 
                })
            });
            
            const data = await response.json();
            
            if (response.ok) {
                showMessage('OTP sent successfully! Use 123456 for testing', 'success');
                document.getElementById('phoneSection').style.display = 'none';
                document.getElementById('verifySection').style.display = 'block';
            } else {
                showMessage(data.error || 'Failed to send OTP', 'error');
            }
        } catch (error) {
            console.error('OTP request error:', error);
            showMessage('Failed to send OTP. Please try again.', 'error');
        }
    }

    async function verifyOTP() {
        const otp = document.getElementById('otp').value.trim();
        
        if (!otp) {
            showMessage('Please enter the OTP', 'error');
            return;
        }
        
        try {
            const response = await fetch('/api/auth/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    phone: currentPhone,
                    code: otp,  // Changed from 'otp' to 'code' to match backend
                    role: currentRole 
                })
            });
            
            const data = await response.json();
            
            if (response.ok && data.token) {
                showMessage('Login successful! Redirecting...', 'success');
                
                // Store token
                if (typeof Session !== 'undefined') {
                    Session.setToken(data.token);
                } else {
                    localStorage.setItem('auth_token', data.token);
                }
                
                // Redirect based on role
                setTimeout(() => {
                    const redirect = new URLSearchParams(window.location.search).get('redirect');
                    if (redirect) {
                        window.location.href = redirect;
                    } else if (currentRole === 'seller') {
                        window.location.href = '/seller-dashboard';
                    } else if (currentRole === 'admin') {
                        window.location.href = '/admin';
                    } else {
                        window.location.href = '/';
                    }
                }, 1500);
            } else {
                showMessage(data.error || 'Invalid OTP. Please try again.', 'error');
            }
        } catch (error) {
            console.error('OTP verification error:', error);
            showMessage('Verification failed. Please try again.', 'error');
        }
    }

    async function adminLogin() {
        const username = document.getElementById('adminUsername').value.trim();
        const password = document.getElementById('adminPassword').value.trim();
        
        if (!username || !password) {
            showMessage('Please enter username and password', 'error');
            return;
        }
        
        try {
            const response = await fetch('/api/auth/admin-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            
            const data = await response.json();
            
            if (response.ok && data.token) {
                showMessage('Admin login successful! Redirecting...', 'success');
                
                // Store token
                if (typeof Session !== 'undefined') {
                    Session.setToken(data.token);
                } else {
                    localStorage.setItem('auth_token', data.token);
                }
                
                setTimeout(() => {
                    window.location.href = '/admin';
                }, 1500);
            } else {
                showMessage(data.error || 'Invalid credentials', 'error');
            }
        } catch (error) {
            console.error('Admin login error:', error);
            showMessage('Login failed. Please try again.', 'error');
        }
    }
    
    // Allow Enter key to submit
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('phone').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') requestOTP();
        });
        
        document.getElementById('otp').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verifyOTP();
        });
        
        document.getElementById('adminPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') adminLogin();
        });
    });
</script>
    
    
        
        <script>
            let systemConfig = {};
            let userLikes = new Set();

            // Mobile Navigation Toggle
            function toggleMobileMenu() {
                const navCenter = document.getElementById('navCenter');
                const isActive = navCenter.classList.contains('active');
                
                if (isActive) {
                    navCenter.classList.remove('active');
                    document.body.style.overflow = '';
                } else {
                    navCenter.classList.add('active');
                    document.body.style.overflow = 'hidden';
                }
            }

            // Initialize Application
            async function init() {
                try {
                    // Fetch system configuration
                    const configResp = await fetch('/api/health/config');
                    systemConfig = await configResp.json();

                    if (systemConfig.pilot_mode) {
                        const pilotElement = document.getElementById('pilotCity');
                        if (pilotElement) {
                            pilotElement.innerText = systemConfig.constraints.RESTRICTED_CITY;
                        }
                    }
                } catch (e) { 
                    console.error('Config fetch failed:', e); 
                }

                // Load user likes if authenticated
                await loadUserLikes();
                
                // Fetch and display designs if on collection page
                if (typeof fetchDesigns === 'function') {
                    await fetchDesigns();
                }
            }

            // Load User Likes
            async function loadUserLikes() {
                if (typeof Session === 'undefined' || !Session.isAuthenticated()) return;

                try {
                    const response = await fetch('/api/likes/me', {
                        headers: { 'Authorization': `Bearer ${Session.getToken()}` }
                    });
                    if (response.ok) {
                        const likes = await response.json();
                        userLikes = new Set(likes.map(l => l.design_id));
                    }
                } catch (e) {
                    console.error('Failed to load likes:', e);
                }
            }

            // Enhanced Like Toggle with Animation
            async function toggleLike(event, design_id, btn) {
                event.stopPropagation();
                
                if (!Session.isAuthenticated()) {
                    window.location.href = '/login.html';
                    return;
                }

                try {
                    const res = await fetch('/api/likes/toggle', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${Session.getToken()}`
                        },
                        body: JSON.stringify({ design_id })
                    });
                    
                    const data = await res.json();
                    
                    if (res.ok) {
                        // Update local state
                        if (data.liked) {
                            userLikes.add(design_id);
                        } else {
                            userLikes.delete(design_id);
                        }
                        
                        // Animate the like button
                        if (window.heavyDropsEnhanced) {
                            window.heavyDropsEnhanced.animateLike(btn, data.liked);
                        } else {
                            btn.classList.toggle('active', data.liked);
                        }
                    }
                } catch (e) {
                    console.error('Like toggle failed:', e);
                }
            }

            // Initialize when DOM is ready
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        </script>
        
        
</body>
